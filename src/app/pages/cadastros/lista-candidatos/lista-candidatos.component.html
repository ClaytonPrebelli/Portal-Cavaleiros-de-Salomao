
<app-header></app-header>
<div class="overlay" *ngIf="busy">
    <img src="../../../assets/images/glumbsp_logo.png" alt="GLUMBSP" class="loading col-12 col-md-1">
</div>
<div class="candidatos contanier-fluid">
    <div class="candidatos--inner container">
        <app-breadcumb></app-breadcumb>
        <h2 class="candidatos--inner--title">Candidatos</h2>

        <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
            <ng-container matColumnDef="indice">
              <th mat-header-cell *matHeaderCellDef> Nr </th>
              <td mat-cell *matCellDef="let element, let i = index"> 
                {{i+1}}
              </td>
            </ng-container>
                
                <ng-container matColumnDef="nome">
                    <th mat-header-cell *matHeaderCellDef class="cap"> Nome </th>
                    <td mat-cell *matCellDef="let element"> {{element.nome}}</td>
                  </ng-container>
                  <ng-container matColumnDef="status">
                    <th mat-header-cell *matHeaderCellDef> Status </th>
                    <td mat-cell *matCellDef="let element"> {{element.status.status}}</td>
                  </ng-container>
                <ng-container matColumnDef="acoes">
                    <th mat-header-cell *matHeaderCellDef> Ações </th>
                    <td mat-cell *matCellDef="let element"> 
                      <div class="acoes">
                        <a routerLink="/ficha/candidato/{{element.id}}"  class="acoes--btn" mat-raised-button><mat-icon class="acoes--btn--icon">picture_as_pdf</mat-icon>Ficha</a>
                        
                      </div>
                    </td>
                  </ng-container>
    
                  <tr mat-header-row *matHeaderRowDef="displayedColumns,true" updateStickyHeaderRowStyles></tr>
                  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
        </div>
    </div>
